<!-- YOUR CURRENT SCRIPT -->
<script>
  window.addEventListener('scroll',()=>{
    document.getElementById('btt').classList.toggle('visible',window.scrollY>400);
  });

  document.getElementById('hamburger').addEventListener('click',()=>{
    document.getElementById('mobileMenu').classList.add('open');
    document.body.style.overflow='hidden';
  });

  document.getElementById('mobileClose').addEventListener('click',closeMenu);

  document.querySelectorAll('.mobile-link').forEach(l=>
    l.addEventListener('click',closeMenu)
  );

  function closeMenu(){
    document.getElementById('mobileMenu').classList.remove('open');
    document.body.style.overflow='';
  }

  const obs=new IntersectionObserver(e=>{
    e.forEach(i=>{
      if(i.isIntersecting){
        i.target.classList.add('visible');
        obs.unobserve(i.target);
      }
    });
  },{threshold:0.08});

  document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));

  function handleSubmit(){
    const b=document.querySelector('.form-submit');
    b.textContent='✓ Sent! We\\'ll reply within 24hrs';
    b.style.background='#1e6e3a';

    setTimeout(()=>{
      b.textContent='Send Enquiry ↗';
      b.style.background='';
    },4000);
  }
</script>
